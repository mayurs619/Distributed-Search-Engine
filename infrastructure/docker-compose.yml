services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres-shard-1:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: search_shard_1
    ports:
      - "5432:5432"

  postgres-shard-2:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: search_shard_2
    ports:
      - "5433:5432" # Note the port mapping difference